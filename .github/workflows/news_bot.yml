name: Ukraine News Bot

on:
  schedule:
    - cron: '0 */6 * * *'   # перезапуск раз на 6 год (бот сам крутиться 5.5 год в циклі)
  workflow_dispatch:          # ручний запуск

concurrency:
  group: news-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350      # 5.8 год — loop крутиться 5.5 год
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install feedparser requests python-dotenv

      - name: Write config.env
        run: echo "${{ secrets.UN_1_env }}" > config.env

      - name: Configure git
        run: |
          git config user.email "bot@github-actions"
          git config user.name "GitHub Actions Bot"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

      - name: Run bot loop
        run: |
          END=$(($(date +%s) + 19800))   # 5.5 год = 19800 сек
          EVENT="${GITHUB_EVENT_NAME}"

          while [ $(date +%s) -lt $END ]; do
            git pull --rebase origin main || true

            GITHUB_EVENT_NAME="$EVENT" python news_bot.py

            git add state.json published.json posts_log.json 2>/dev/null || true
            git diff --cached --quiet || git commit -m "bot: state [skip ci]"
            git push origin main || true

            EVENT="loop"   # наступні ітерації — не manual run

            REMAINING=$((END - $(date +%s)))
            [ $REMAINING -gt 1800 ] && sleep 1800 || break
          done
