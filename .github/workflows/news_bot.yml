name: Ukraine News Bot

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: news-bot
  cancel-in-progress: false  # чергу, не скасування

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install feedparser requests python-dotenv

      - name: Write config.env
        run: echo "${{ secrets.UN_1_env }}" > config.env

      - name: Configure git
        run: |
          git config user.email "bot@github-actions"
          git config user.name "GitHub Actions Bot"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git pull --rebase origin main || true

      - name: Run bot
        env:
          MANUAL_RUN: ${{ github.event_name == 'workflow_dispatch' }}
        run: python news_bot.py

      - name: Save state
        if: always()
        run: |
          git add state.json published.json posts_log.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "bot: state update [skip ci]"
          git pull --rebase origin main || true
          git push origin main
