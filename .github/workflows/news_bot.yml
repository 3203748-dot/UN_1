name: Ukraine News Bot

on:
  schedule:
    - cron: '*/30 * * * *'   # кожні 30 хв; бот сам вирішує чи час публікувати
  workflow_dispatch:          # ручний запуск з GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests python-dotenv

      - name: Write config.env
        run: echo "${{ secrets.UN_1_env }}" > config.env

      - name: Pull latest state
        run: |
          git config user.email "bot@github-actions"
          git config user.name "GitHub Actions Bot"
          git pull --rebase origin main || true

      - name: Run news bot
        run: python news_bot.py

      - name: Save state
        run: |
          git config user.email "bot@github-actions"
          git config user.name "GitHub Actions Bot"
          git add state.json published.json posts_log.json || true
          git diff --cached --quiet || git commit -m "bot: update state [skip ci]"
          git push || true
